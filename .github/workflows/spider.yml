name: Update Articles

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  spider:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install
        run: pip install requests

      - name: Run Spider
        run: python spider/spider.py

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update articles" || echo "no change"
          git push
